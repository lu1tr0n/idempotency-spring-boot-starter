# Testcontainers configuration scoped to the test classpath.
#
# Ryuk is Testcontainers' cleanup container — a small sidecar that watches the
# JVM and force-kills any leftover test containers if the suite crashes
# mid-run. It is helpful in long-lived local dev environments where you might
# kill a JVM with `kill -9` and leave Postgres/Redis processes orphaned.
#
# It is not appropriate for our CI: GitHub Actions runners are destroyed after
# each job, so leftover containers cannot accumulate. Disabling Ryuk also
# dodges a known flakiness on some Docker socket configurations (WSL2,
# rootless Docker) where the Ryuk handshake intermittently times out and
# the suite reports a misleading `initializationError`.
ryuk.disabled=true
