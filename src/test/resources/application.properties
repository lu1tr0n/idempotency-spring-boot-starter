# Flyway and Liquibase are on the test classpath only to exercise the bundled
# migration artifacts (see MigrationScriptsIT, which drives them via their Java
# API). Their Spring Boot auto-configuration must stay OFF for the @SpringBootTest
# suites: those use an auto-configured H2 DataSource, which would otherwise make
# Liquibase look for a (non-existent) default master changelog and fail context
# startup. The migration IT is unaffected — it never relies on this auto-config.
spring.flyway.enabled=false
spring.liquibase.enabled=false
