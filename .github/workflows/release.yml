name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  publish:
    name: Publish to Maven Central
    runs-on: ubuntu-latest
    permissions:
      contents: write   # for `gh release create` later in the job
      packages: write   # for publish to GitHub Packages mirror
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0   # full history so the tag's annotation is available

      - name: Set up JDK 21 (Temurin)
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.0.0
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Verify VERSION_NAME matches the tag
        # Defensive check: the tag (e.g. `v0.0.2`) and the VERSION_NAME in
        # gradle.properties must agree, or we publish a version whose git
        # ref does not match â€” a debugging nightmare three months later.
        env:
          GIT_TAG: ${{ github.ref_name }}
        run: |
          GRADLE_VERSION=$(grep '^VERSION_NAME=' gradle.properties | cut -d= -f2)
          EXPECTED_TAG="v${GRADLE_VERSION}"
          if [ "${GIT_TAG}" != "${EXPECTED_TAG}" ]; then
            echo "::error::Tag (${GIT_TAG}) does not match gradle.properties VERSION_NAME (expected ${EXPECTED_TAG})"
            exit 1
          fi
          echo "Releasing ${GRADLE_VERSION} (tag ${GIT_TAG})"

      - name: Build + test
        run: ./gradlew build --no-daemon --stacktrace

      - name: Publish to Maven Central via Central Portal
        # Vanniktech's plugin reads the GPG key from `signingInMemoryKey*`
        # properties and the Sonatype credentials from `mavenCentralUsername`
        # / `mavenCentralPassword`. `publishToMavenCentral` uploads the signed
        # staging bundle; because `automaticRelease = true` is set in the build
        # files, the Portal validators promote the deployment without a manual
        # "Publish" click, and the task blocks until each deployment reaches a
        # terminal (validated) state.
        #
        # 0.30.0 creates one deployment PER module, not an aggregated one, so
        # publish `idempotency-core` FIRST: the starter POM declares a
        # dependency on it, and publishing the dependency (and waiting for it to
        # validate) before the artifact that references it means a core failure
        # aborts this step before a starter pointing at a missing coordinate can
        # ever go public.
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.GPG_SIGNING_PASSPHRASE }}
        run: |
          ./gradlew :idempotency-core:publishToMavenCentral --no-configuration-cache --no-daemon --stacktrace
          ./gradlew :publishToMavenCentral --no-configuration-cache --no-daemon --stacktrace

      - name: Mirror to GitHub Packages
        # Secondary publish target â€” keeps the repo page sidebar showing a
        # package and provides a backup registry. Maven Central is still the
        # canonical place to consume from (no auth required). Uses the same
        # signed artifacts produced for the Central publish above.
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.GPG_SIGNING_PASSPHRASE }}
        run: ./gradlew publishAllPublicationsToGitHubPackagesRepository --no-configuration-cache --no-daemon --stacktrace

      - name: Create GitHub Release
        # Single source of truth for release notes is the tag annotation
        # (`git tag -s vX.Y.Z -m "..."`). gh CLI reads that automatically.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GIT_TAG: ${{ github.ref_name }}
          GH_REPO: ${{ github.repository }}
        run: |
          VERSION="${GIT_TAG#v}"
          gh release create "${GIT_TAG}" \
            --repo "${GH_REPO}" \
            --title "${GIT_TAG}" \
            --notes "Released to Maven Central. Coordinates: \`io.github.lu1tr0n:idempotency-spring-boot-starter:${VERSION}\` (the starter) and \`io.github.lu1tr0n:idempotency-core:${VERSION}\` (the dependency-free storage SPI for custom backends) â€” see [the package page](https://central.sonatype.com/artifact/io.github.lu1tr0n/idempotency-spring-boot-starter/${VERSION})."
