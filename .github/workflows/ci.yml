name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  build:
    name: Build + test (Java ${{ matrix.java }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Build under both the toolchain version (Java 21) and our minimum
        # consumer baseline (Java 17). The bytecode target is 17 in
        # build.gradle.kts so a Java 17 consumer can resolve our artifact;
        # this matrix proves the test suite actually runs on both.
        java: ['17', '21']
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up JDK ${{ matrix.java }} (Temurin)
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.0.0
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Build + test
        # `--no-daemon` avoids leaking state between matrix legs.
        run: ./gradlew build --no-daemon --stacktrace

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-reports-java-${{ matrix.java }}
          path: build/reports/tests/
          retention-days: 14

  floor:
    # We advertise "Spring Boot 3.5+". This job guards it: it builds and runs
    # the whole suite against the FLOOR of that range (Boot 3.5.0) instead of
    # the latest patch. Compiling green here proves the source only references
    # symbols that already exist in 3.5.0, so we never accidentally require a
    # later 3.5.x patch. Runs on Java 17, the minimum consumer baseline.
    name: Floor compat (Boot 3.5.0, Java 17)
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up JDK 17 (Temurin)
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.0.0
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Build + test against the floor BOM
        run: ./gradlew build --no-daemon --stacktrace -PspringBootBomVersion=3.5.0

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-reports-floor
          path: build/reports/tests/
          retention-days: 14
